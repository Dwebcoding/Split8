<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · SPLit8</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>

  <div class="page">
    <!-- Navbar Component -->`n    <div id="navbar-placeholder"></div>

    <section class="hero hero--compact">
      <div class="hero__background">
        <div class="hero__gradient"></div>
        <div class="hero__grid"></div>
      </div>
      
      <div class="hero__content">
        <h1 class="hero__title">Accedi</h1>
        <p class="hero__subtitle">Torna alla tua piattaforma</p>
      </div>
    </section>

    <main class="main">
      <section class="section" style="max-width: 500px; margin: 4rem auto; padding: 0 1rem;">
        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tu@example.com" required />
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>
          
          <div class="form-actions">
            <button type="submit" class="btn btn--primary" style="width: 100%;">Accedi</button>
          </div>
          
          <div class="form-footer">
            <p>Non hai un account? <a href="signup.html">Iscriviti</a></p>
            <p><a href="forgot-password.html">Password dimenticata?</a></p>
          </div>
        </form>
      </section>
    </main>

    <!-- Footer Component -->`n    <div id="footer-placeholder"></div>
  </div>

  <script src="../js/router.js"></script>
  <script src="../js/skyline.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // TODO: Implementare logica di login
      console.log('Login:', {
        email: this.email.value,
        password: this.password.value
      });
      // Redirect a dashboard dopo login
      // window.location.href = 'dashboard/freelancer/index.html';
    });
  </script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>
