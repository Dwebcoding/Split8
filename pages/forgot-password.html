<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Dimenticata · SPLit8</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>

  <div class="page">
    <!-- Navbar Component -->`n    <div id="navbar-placeholder"></div>

    <section class="hero hero--compact">
      <div class="hero__background">
        <div class="hero__gradient"></div>
        <div class="hero__grid"></div>
      </div>
      
      <div class="hero__content">
        <h1 class="hero__title">Recupera Password</h1>
        <p class="hero__subtitle">Recupera l'accesso al tuo account</p>
      </div>
    </section>

    <main class="main">
      <section class="section" style="max-width: 500px; margin: 4rem auto; padding: 0 1rem;">
        <form class="auth-form" id="forgotForm">
          <p style="margin-bottom: 2rem; color: #666;">Inserisci l'email associata al tuo account e ti invieremo un link per recuperare la password.</p>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tu@example.com" required />
          </div>
          
          <div class="form-actions">
            <button type="submit" class="btn btn--primary" style="width: 100%;">Invia Link di Recupero</button>
          </div>
          
          <div class="form-footer">
            <p>Ricordi la password? <a href="login.html">Accedi</a></p>
          </div>
        </form>
      </section>
    </main>

    <!-- Footer Component -->`n    <div id="footer-placeholder"></div>
  </div>

  <script src="../js/router.js"></script>
  <script src="../js/skyline.js"></script>
  <script>
    const API_BASE = 'http://localhost:3000';
    
    async function apiCall(endpoint, options = {}) {
      try {
        const response = await fetch(`${API_BASE}${endpoint}`, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Errore richiesta');
        return data;
      } catch (err) {
        throw err;
      }
    }

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = this.email.value.trim().toLowerCase();
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      
      if (!email) {
        alert('❌ Inserisci la tua email');
        return;
      }

      try {
        submitBtn.textContent = 'Invio in corso...';
        submitBtn.disabled = true;

        const result = await apiCall('/api/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email })
        });

        alert('✅ ' + result.message + '\n\nControlla la tua casella di posta (anche spam).');
        this.reset();
        
        // Redirect dopo 2 secondi
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (error) {
        if (error.message.includes('Troppe richieste')) {
          alert('⚠️ Hai già richiesto il reset. Controlla la tua email o riprova tra 1 ora.');
        } else {
          alert('❌ ' + (error.message || 'Errore richiesta reset'));
        }
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>
