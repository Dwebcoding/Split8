<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Il Mio Profilo · SPLit8</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>

  <div class="page">
    <!-- Navbar Component -->`n    <div id="navbar-placeholder"></div>

    <section class="hero hero--compact">
      <div class="hero__background">
        <div class="hero__gradient"></div>
        <div class="hero__grid"></div>
      </div>
      
      <div class="hero__content">
        <h1 class="hero__title">Profilo Professionale</h1>
      </div>
    </section>

    <main class="main">
      <section class="section" style="max-width: 1200px; margin: 0 auto;">
        <div style="display: grid; grid-template-columns: 200px 1fr; gap: 2rem;">
          <!-- Sidebar Dashboard -->
          <aside class="dashboard-sidebar">
            <nav class="dashboard-nav">
              <a href="index.html" class="dashboard-nav__link">Dashboard</a>
              <a href="projects.html" class="dashboard-nav__link">Progetti</a>
              <a href="requests.html" class="dashboard-nav__link">Richieste</a>
              <a href="portfolio.html" class="dashboard-nav__link">Portfolio</a>
              <a href="messages.html" class="dashboard-nav__link">Messaggi</a>
              <a href="reviews.html" class="dashboard-nav__link">Valutazioni</a>
              <a href="alerts.html" class="dashboard-nav__link">Alert</a>
              <a href="analytics.html" class="dashboard-nav__link">Analytics</a>
              <a href="profile.html" class="dashboard-nav__link active">Profilo</a>
              <a href="../account.html" class="dashboard-nav__link">Account</a>
            </nav>
          </aside>

          <!-- Content -->
          <div class="dashboard-content">
            <h2>Informazioni Professionali</h2>
            <form style="margin-top: 2rem;">
              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;">
                <div class="form-group">
                  <label for="profName">Nome Completo</label>
                  <input type="text" id="profName" value="Mario Rossi" />
                </div>
                
                <div class="form-group">
                  <label for="specialization">Specializzazione Principale</label>
                  <select id="specialization">
                    <option>Architetto</option>
                    <option>Geometra</option>
                    <option>Ingegnere</option>
                    <option>Designer</option>
                  </select>
                </div>
                
                <div class="form-group">
                  <label for="bio">Bio Professionale</label>
                  <textarea id="bio" rows="3" placeholder="Descrivi la tua esperienza..."></textarea>
                </div>
                
                <div class="form-group">
                  <label for="experience">Anni di Esperienza</label>
                  <input type="number" id="experience" value="12" />
                </div>
              </div>

              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 1.5rem;">
                <div class="form-group">
                  <label for="area">Area Geografica Principale</label>
                  <input type="text" id="area" value="Lombardia" />
                </div>
                
                <div class="form-group">
                  <label for="website">Website/Portfolio</label>
                  <input type="url" id="website" placeholder="https://..." />
                </div>
              </div>

              <h3 style="margin-top: 2rem;">Specializzazioni</h3>
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                <label style="display: flex; gap: 0.5rem; align-items: center;">
                  <input type="checkbox" checked />
                  <span>Progettazione Residenziale</span>
                </label>
                <label style="display: flex; gap: 0.5rem; align-items: center;">
                  <input type="checkbox" checked />
                  <span>Sopralluoghi Tecnici</span>
                </label>
                <label style="display: flex; gap: 0.5rem; align-items: center;">
                  <input type="checkbox" />
                  <span>Design Commerciale</span>
                </label>
              </div>

              <h3 style="margin-top: 2rem;">Certificazioni</h3>
              <div style="margin-top: 1rem;">
                <button type="button" class="btn btn--small btn--outline">+ Aggiungi Certificazione</button>
              </div>

              <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn--primary">Salva Profilo</button>
                <a href="profile.html" class="btn btn--outline" style="text-decoration: none; display: inline-flex; align-items: center;">Anteprima Profilo Pubblico</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer Component -->`n    <div id="footer-placeholder"></div>
  </div>

  <script src="../../js/router.js"></script>
  <script src="../../js/skyline.js"></script>
  <script src="../../../js/navbar.js"></script>
  <script src="../../../js/footer.js"></script>
</body>
</html>
