<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Il Mio Account · SPLit8</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>

  <div class="page">
    <!-- Navbar Component -->`n    <div id="navbar-placeholder"></div>

    <section class="hero hero--compact">
      <div class="hero__background">
        <div class="hero__gradient"></div>
        <div class="hero__grid"></div>
      </div>
      
      <div class="hero__content">
        <h1 class="hero__title">Impostazioni Account</h1>
      </div>
    </section>

    <main class="main">
      <section class="section" style="max-width: 900px; margin: 0 auto;">
        <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem;">
          <!-- Sidebar -->
          <aside class="account-sidebar">
            <nav class="account-nav">
              <a href="account.html" class="account-nav__link active">Profilo</a>
              <a href="account/subscription.html" class="account-nav__link">Abbonamento</a>
              <a href="#" class="account-nav__link">Notifiche</a>
              <a href="#" class="account-nav__link">Privacy e Dati</a>
              <a href="#" class="account-nav__link">Sicurezza</a>
              <a href="#" class="account-nav__link">Disattiva Account</a>
            </nav>
          </aside>

          <!-- Content -->
          <div class="account-content">
            <h2>Informazioni Profilo</h2>
            <form id="accountForm" style="margin-top: 2rem;">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="user@example.com" required />
              </div>
              
              <div class="form-group">
                <label for="fullname">Nome Completo</label>
                <input type="text" id="fullname" name="fullname" value="Mario Rossi" required />
              </div>
              
              <div class="form-group">
                <label for="phone">Telefono</label>
                <input type="tel" id="phone" name="phone" value="+39 123 456 7890" />
              </div>
              
              <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3" placeholder="Descrivi te stesso brevemente..."></textarea>
              </div>
              
              <button type="submit" class="btn btn--primary">Salva Modifiche</button>
            </form>

            <hr style="margin: 3rem 0; border: none; border-top: 1px solid #ddd;">

            <h2>Cambio Password</h2>
            <form id="passwordForm" style="margin-top: 2rem;">
              <div class="form-group">
                <label for="currentPass">Password Attuale</label>
                <input type="password" id="currentPass" name="currentPass" required />
              </div>
              
              <div class="form-group">
                <label for="newPass">Nuova Password</label>
                <input type="password" id="newPass" name="newPass" required />
              </div>
              
              <div class="form-group">
                <label for="confirmPass">Conferma Password</label>
                <input type="password" id="confirmPass" name="confirmPass" required />
              </div>
              
              <button type="submit" class="btn btn--primary">Aggiorna Password</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer Component -->`n    <div id="footer-placeholder"></div>
  </div>

  <script src="../js/router.js"></script>
  <script src="../js/skyline.js"></script>
  <script>
    document.getElementById('accountForm').addEventListener('submit', function(e) {
      e.preventDefault();
      console.log('Account updated:', {
        email: this.email.value,
        fullname: this.fullname.value,
        phone: this.phone.value,
        bio: this.bio.value
      });
      alert('Profilo aggiornato con successo!');
    });

    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (this.newPass.value !== this.confirmPass.value) {
        alert('Le password non corrispondono!');
        return;
      }
      console.log('Password updated');
      alert('Password aggiornata con successo!');
      this.reset();
    });
  </script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>
