<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iscriviti · SPLit8</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <canvas id="skyline-canvas" aria-hidden="true"></canvas>

  <div class="page">
    <!-- Navbar Component -->`n    <div id="navbar-placeholder"></div>

    <section class="hero hero--compact">
      <div class="hero__content">
        <p class="hero__eyebrow">Benvenuto su SPLit8</p>
        <h2 class="hero__title" style="font-size: 1.8rem;">Crea il tuo account</h2>
        <p class="hero__subtitle">
          Registrati in pochi minuti e inizia a gestire sopralluoghi e progetti tecnici in tempo reale.
        </p>
      </div>
    </section>

    <section class="card" style="max-width: 520px; margin: 0 auto 60px;">
      <form id="signupForm" class="auth-form" novalidate>
        <label class="field">
          <span>Nome completo *</span>
          <input type="text" name="fullName" placeholder="Es. Luca Bianchi" required />
          <small class="error"></small>
        </label>
        <label class="field">
          <span>Email professionale *</span>
          <input type="email" name="email" placeholder="nome@studio.it" required />
          <small class="error"></small>
        </label>
        <label class="field">
          <span>Password *</span>
          <input type="password" name="password" placeholder="Min. 8 caratteri" required />
          <small class="error"></small>
        </label>
        <label class="field">
          <span>Conferma password *</span>
          <input type="password" name="passwordConfirm" placeholder="Ripeti la password" required />
          <small class="error"></small>
        </label>
        <label class="field">
          <span>Profilo *</span>
          <select name="role" required>
            <option value="">Seleziona il tuo ruolo</option>
            <option value="freelancer">Freelancer</option>
            <option value="studio">Studio tecnico</option>
            <option value="azienda">Azienda</option>
          </select>
          <small class="error"></small>
        </label>
        <label class="field" style="display: flex; gap: 10px; align-items: flex-start;">
          <input type="checkbox" name="terms" required style="margin-top: 4px;" />
          <span style="font-size: 0.85rem; color: var(--muted);">
            Accetto i <a href="#" style="color: var(--accent); text-decoration: none;">Termini di servizio</a> e l'<a href="#" style="color: var(--accent); text-decoration: none;">Informativa sulla privacy</a>
          </span>
        </label>
        <button type="submit" class="btn" style="margin-top: 8px;">Iscriviti</button>
        <p class="muted" id="signupStatus" style="text-align: center; margin-top: 12px;"></p>
      </form>
      <div style="border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 18px; margin-top: 18px; text-align: center;">
        <p style="color: var(--muted); font-size: 0.9rem;">
          Hai già un account? <a href="#" onclick="openLoginModal(); return false;" style="color: var(--accent); text-decoration: none;">Accedi qui</a>
        </p>
      </div>
    </section>
  </div>

  <div class="auth-modal" id="authModal" aria-hidden="true" role="dialog" aria-label="Accesso utenti">
    <div class="auth-modal__panel">
      <button class="panel__close" id="closeAuth" aria-label="Chiudi accesso">✕</button>
      <div class="auth-modal__header">
        <h3>Accesso</h3>
        <p>Accedi con le tue credenziali.</p>
      </div>
      <form id="authForm" class="auth-form" novalidate>
        <label class="field">
          <span>Email *</span>
          <input type="email" name="email" placeholder="nome@studio.it" required />
          <small class="error"></small>
        </label>
        <label class="field">
          <span>Password *</span>
          <input type="password" name="password" placeholder="Inserisci password" required />
          <small class="error"></small>
        </label>
        <button type="submit" class="btn">Accedi</button>
        <p class="muted" id="authStatus"></p>
      </form>
    </div>
  </div>

  <script src="../js/script.js"></script>
  <script>
    function openLoginModal() {
      document.getElementById("authModal").classList.add("is-open");
    }

    // Signup form handler
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const fullName = form.fullName.value.trim();
      const email = form.email.value.trim().toLowerCase();
      const password = form.password.value;
      const passwordConfirm = form.passwordConfirm.value;
      const role = form.role.value.trim();
      const status = document.getElementById("signupStatus");

      // Validation
      let hasError = false;
      form.querySelectorAll(".error").forEach((el) => (el.textContent = ""));

      if (!fullName) {
        form.fullName.closest(".field").querySelector(".error").textContent = "Nome richiesto";
        hasError = true;
      }
      if (!email) {
        form.email.closest(".field").querySelector(".error").textContent = "Email richiesta";
        hasError = true;
      }
      if (password.length < 8) {
        form.password.closest(".field").querySelector(".error").textContent = "Min. 8 caratteri";
        hasError = true;
      }
      if (password !== passwordConfirm) {
        form.passwordConfirm.closest(".field").querySelector(".error").textContent = "Le password non coincidono";
        hasError = true;
      }
      if (!role) {
        form.role.closest(".field").querySelector(".error").textContent = "Seleziona un profilo";
        hasError = true;
      }
      if (!form.terms.checked) {
        form.terms.closest(".field").querySelector(".error").textContent = "Accetta i termini";
        hasError = true;
      }

      if (hasError) return;

      status.textContent = "Iscrizione in corso...";
      status.style.color = "var(--muted)";

      try {
        const result = await apiRequest("/api/register", {
          method: "POST",
          body: JSON.stringify({ fullName, email, password, role }),
        });
        
        localStorage.setItem("split8:token", result.token);
        localStorage.setItem("split8:user", JSON.stringify(result.user));
        status.textContent = "Redirect in corso...";
        setTimeout(() => {
          window.location.href = "onboarding.html";
        }, 500);
      } catch (err) {
        status.style.color = "var(--accent)";
        status.textContent = err.message || "Errore iscrizione";
      }
    });

    // Login modal handler
    document.getElementById("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const email = form.email.value.trim().toLowerCase();
      const password = form.password.value;
      const status = document.getElementById("authStatus");

      form.querySelectorAll(".error").forEach((el) => (el.textContent = ""));

      if (!email || !password) {
        status.style.color = "var(--accent)";
        status.textContent = "Credenziali richieste";
        return;
      }

      status.textContent = "Accesso in corso...";
      status.style.color = "var(--muted)";

      try {
        const result = await apiRequest("/api/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        
        localStorage.setItem("split8:token", result.token);
        localStorage.setItem("split8:user", JSON.stringify(result.user));
        status.textContent = "Accesso completato...";
        setTimeout(() => {
          window.location.href = "listings.html";
        }, 500);
      } catch (err) {
        status.style.color = "var(--accent)";
        status.textContent = err.message || "Errore accesso";
      }
    });

    // Auth modal controls
    document.getElementById("openAuth").addEventListener("click", openLoginModal);

    document.getElementById("closeAuth").addEventListener("click", () => {
      document.getElementById("authModal").classList.remove("is-open");
    });

    document.getElementById("authModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("authModal")) {
        document.getElementById("authModal").classList.remove("is-open");
      }
    });
  </script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>

            <span>Password *</span>
            <input type="password" name="password" placeholder="Min. 8 caratteri" required />
            <small class="error"></small>
          </label>

          <label class="field">
            <span>Conferma password *</span>
            <input type="password" name="passwordConfirm" placeholder="Ripeti la password" required />
            <small class="error"></small>
          </label>

          <label class="field">
            <span>Ruolo/Specializzazione *</span>
            <input type="text" name="role" placeholder="Es. Ingegnere strutturista" required />
            <small class="error"></small>
          </label>

          <label class="field">
            <span>Accetto i termini di servizio *</span>
            <div style="display: flex; align-items: center; gap: 8px;">
              <input type="checkbox" name="terms" required style="width: 18px; cursor: pointer;" />
              <span style="font-size: 0.9rem;">Ho letto e accetto i <a href="#" style="color: var(--accent);">termini</a> e la <a href="#" style="color: var(--accent);">privacy</a></span>
            </div>
            <small class="error"></small>
          </label>

          <div class="actions">
            <button type="submit" class="btn">Procedi</button>
          </div>

          <p class="muted" style="text-align: center; font-size: 0.85rem; margin-top: 12px;">
            Hai già un account? <a href="../index.html" style="color: var(--accent);">Accedi qui</a>
          </p>

          <p id="signupStatus" class="muted" style="text-align: center; margin-top: 8px;"></p>
        </form>
      </section>
    </main>

    <!-- Footer Component -->`n    <div id="footer-placeholder"></div>
  </div>

  <script>
    const state = {
      auth: {
        token: localStorage.getItem("split8:token") || "",
        user: JSON.parse(localStorage.getItem("split8:user") || "null"),
      },
    };

    const apiRequest = async (url, options = {}) => {
      const headers = {
        "Content-Type": "application/json",
        ...(state.auth.token ? { Authorization: `Bearer ${state.auth.token}` } : {}),
        ...(options.headers || {}),
      };

      const response = await fetch(url, { ...options, headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        const message = payload.error || "Errore server.";
        throw new Error(message);
      }
      return payload;
    };

    const form = document.getElementById("signupForm");
    const status = document.getElementById("signupStatus");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const fields = form.querySelectorAll("[name]");
      let isValid = true;
      fields.forEach((field) => {
        const error = field.closest(".field")?.querySelector(".error");
        if (field.name === "terms") {
          if (!field.checked) {
            error.textContent = "Devi accettare i termini.";
            isValid = false;
          } else {
            error.textContent = "";
          }
          return;
        }
        if (!field.value.trim()) {
          error.textContent = "Campo obbligatorio.";
          isValid = false;
        } else if (field.name === "password" && field.value.length < 8) {
          error.textContent = "Minimo 8 caratteri.";
          isValid = false;
        } else if (field.name === "passwordConfirm" && field.value !== form.password.value) {
          error.textContent = "Le password non coincidono.";
          isValid = false;
        } else {
          error.textContent = "";
        }
      });

      if (!isValid) return;

      try {
        status.textContent = "Iscrizione in corso...";
        const result = await apiRequest("/api/register", {
          method: "POST",
          body: JSON.stringify({
            fullName: form.fullName.value.trim(),
            email: form.email.value.trim().toLowerCase(),
            password: form.password.value,
            role: form.role.value.trim(),
          }),
        });

        localStorage.setItem("split8:token", result.token);
        localStorage.setItem("split8:user", JSON.stringify(result.user));
        status.textContent = "Iscritto con successo! Reindirizzamento...";
        setTimeout(() => {
          window.location.href = "onboarding.html";
        }, 1500);
      } catch (error) {
        status.textContent = error.message;
      }
    });
  </script>
  <script src="../js/script.js"></script>
    <script src="../js/router.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>
