<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimposta Password | SPLit8</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <canvas id="skyline-canvas"></canvas>
  
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="logo">SPLit8</a>
      <ul class="nav-menu">
        <li><a href="/pages/login.html">Accedi</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero hero--compact">
    <div class="container">
      <h1>Reimposta la Tua Password</h1>
    </div>
  </section>

  <main class="container" style="margin: 4rem auto; max-width: 500px;">
    
    <div class="card">
      <h2 style="margin: 0 0 1rem 0;">Nuova Password</h2>
      <p style="margin: 0 0 2rem 0; color: #888;">Inserisci la tua nuova password. Deve contenere almeno 8 caratteri.</p>
      
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="password">Nuova Password</label>
          <input type="password" id="password" required minlength="8" placeholder="Almeno 8 caratteri">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Conferma Password</label>
          <input type="password" id="confirmPassword" required minlength="8" placeholder="Ripeti la password">
        </div>

        <div style="padding: 1rem; background: rgba(255,159,67,0.1); border-left: 4px solid #ff9f43; border-radius: 8px; margin-bottom: 1.5rem;">
          <p style="margin: 0; font-size: 0.9rem; color: #ff9f43;">
            <strong>Requisiti password:</strong><br>
            • Almeno 8 caratteri<br>
            • Una lettera maiuscola<br>
            • Un numero<br>
            • Un carattere speciale
          </p>
        </div>

        <button type="submit" class="btn--primary" style="width: 100%; padding: 1rem;">Reimposta Password</button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/pages/login.html" style="color: var(--accent);">Torna al Login</a>
      </div>
    </div>

  </main>

  <!-- Footer Component -->`n    <div id="footer-placeholder"></div>

  <script src="../js/router.js"></script>
  <script src="../js/skyline.js"></script>
  <script>
    const API_BASE = 'http://localhost:3000';
    
    async function apiCall(endpoint, options = {}) {
      try {
        const response = await fetch(`${API_BASE}${endpoint}`, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Errore richiesta');
        return data;
      } catch (err) {
        throw err;
      }
    }

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      alert('❌ Link non valido. Richiedi un nuovo link per il recupero password.');
      window.location.href = '/pages/forgot-password.html';
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;

      // Validation
      if (password !== confirmPassword) {
        alert('❌ Le password non corrispondono!');
        return;
      }

      // Password strength validation
      if (password.length < 8) {
        alert('❌ Password troppo corta (minimo 8 caratteri)');
        return;
      }

      const hasUpperCase = /[A-Z]/.test(password);
      const hasLowerCase = /[a-z]/.test(password);
      const hasNumber = /[0-9]/.test(password);

      if (!hasUpperCase || !hasLowerCase || !hasNumber) {
        alert('❌ Password deve contenere: maiuscole, minuscole e numeri');
        return;
      }

      try {
        submitBtn.textContent = 'Reset in corso...';
        submitBtn.disabled = true;

        const result = await apiCall('/api/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, newPassword: password })
        });

        alert('✅ ' + result.message);
        
        // Redirect a login
        setTimeout(() => {
          window.location.href = '/pages/login.html';
        }, 1000);
      } catch (error) {
        if (error.message.includes('scaduto')) {
          alert('❌ Il link è scaduto. Richiedi un nuovo link di reset.');
          setTimeout(() => {
            window.location.href = '/pages/forgot-password.html';
          }, 2000);
        } else if (error.message.includes('Troppi tentativi')) {
          alert('⚠️ Troppi tentativi. Riprova tra 15 minuti.');
        } else {
          alert('❌ ' + (error.message || 'Errore reset password'));
        }
        
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>
